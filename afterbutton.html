<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Корзина</title>
  <style>
    body { 
      font-family: MONOSPACE; 
      padding: 20px; 
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background-color: #f4f4f4;
      min-height: 100vh;
      margin: 0;
    }
    .cart-container {
      width: 400px;
      border: 2px dotted black;
      padding: 30px;
      border-radius: 30px;
      background: white;
      text-align: center;
    }
    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #ccc;
      padding: 10px 0;
      cursor: pointer;
    }
    .delete-btn {
      background-color: red;
      color: white;
      border: none;
      border-radius: 5px;
      padding: 5px 10px;
      font-family: MONOSPACE;
      font-size: 12px;
      cursor: pointer;
      display: none;
      margin-left: 10px;
    }
    .item:hover .delete-btn, .item.active .delete-btn {
      display: inline-block;
    }
    .total {
      font-size: 20px;
      font-weight: bold;
      margin-top: 20px;
    }
    .btn-back {
      margin-top: 20px;
      background: black;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 15px;
      cursor: pointer;
      font-family: MONOSPACE;
    }
    /* Стили для модального окна */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 30px;
      border: 2px dotted black;
      width: 350px;
      text-align: center;
      font-family: MONOSPACE;
    }
    .modal-buttons {
      display: flex;
      justify-content: space-around;
      margin-top: 20px;
    }
  </style>
<script type="text/javascript" src="https://cdn.jsdelivr.net"></script>
</head>
<body>

  <!-- Модальное окно подтверждения -->
  <div id="modal-confirm" class="modal-overlay">
    <div class="modal-content">
      <p id="modal-text"></p>
      <div class="modal-buttons">
        <button id="modal-yes" class="btn-back" style="margin-top:0;">Да</button>
        <button id="modal-no" class="btn-back" style="background:gray; margin-top:0;">Нет</button>
      </div>
    </div>
  </div>

  <!-- Модальное окно уведомления (ОК) -->
  <div id="modal-alert" class="modal-overlay">
    <div class="modal-content">
      <p id="alert-text"></p>
      <button id="modal-ok" class="btn-back" style="margin-top:20px; width:100%;">ОК</button>
    </div>
  </div>

  <div class="cart-container">
    <h2>Ваша Корзина</h2>

    <div id="total-info">
        <div class="total">Итого: <span id="total-sum">0</span> грн</div>
    </div>

    <div id="checkout-form" style="display: none; margin-top: 20px; border-top: 2px solid #ccc; pt: 20px; text-align: left;">
      <h3>Оформление заказа</h3>
      <div style="margin-bottom: 10px;">
        <label>Имя:</label><br>

      </div>
      <div style="margin-bottom: 10px;">

      </div>
      <div style="margin-bottom: 10px;">
        <label>Отчество:</label><br>
        <input type="text" id="middle-name" style="width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #ccc;">
      </div>
      <div style="margin-bottom: 10px;">
        <label>Номер телефона:</label><br>
        <div style="display: flex; gap: 5px;">

          </select>
          <input type="tel" id="phone" placeholder="000 000 00 00" oninput="formatPhone(this)" style="flex: 1; padding: 8px; border-radius: 5px; border: 1px solid #ccc;">
        </div>
      </div>
      <div style="margin-bottom: 10px;">
        <label>Oтделение:</label><br>
        <input type="text" id="branch" style="width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #ccc;">
      </div>
      <div style="margin-bottom: 10px;">
        <label>Адрес:</label><br>
        <input type="text" id="address" style="width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #ccc;">
      </div>
      <div style="margin-bottom: 10px;">
        <label>Способ оплаты:</label><br>
        <select id="payment-method" onchange="toggleCardFields()" style="width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #ccc; font-family: MONOSPACE;">
          <option value="послеоплата">Послеоплата</option>
          <option value="предоплата">Предоплата</option>
        </select>
      </div>
      <div id="card-details" style="display: none; border: 1px dashed black; padding: 15px; border-radius: 10px; margin-bottom: 10px; background: #fafafa;">
        <div style="margin-bottom: 10px;">
          <label>Номер карты:</label><br>
          <input type="text" id="card-number" placeholder="0000 0000 0000 0000" maxlength="16" style="width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #ccc;">
        </div>
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
          <div style="flex: 1;">
            <label>ММ/ГГ:</label><br>
            <input type="text" id="card-expiry" placeholder="MM/YY" maxlength="4" style="width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #ccc;">
          </div>
          <div style="flex: 1;">
            <label>CVV2/CVC2:</label><br>
            <input type="password" id="card-cvv" placeholder="***" maxlength="3" style="width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #ccc;">
          </div>
        </div>
      </div>
      <button class="btn-back" onclick="confirmOrder()" style="background: green; width: 100%;">Подтвердить заказ</button>
      <button class="btn-back" onclick="hideCheckout()" style="background: gray; width: 100%; margin-top: 10px;">Отмена</button>
    </div>

    <div id="cart-actions" style="margin-top: 20px;">
      <button class="btn-back" onclick="showCheckout()" style="background: green;">Оформить заказ</button>
      <button class="btn-back" onclick="clearCart()" style="background: red;">Очистить корзину</button>
      <button class="btn-back" onclick="window.location.href='index.html'">Вернуться к покупкам</button>
    </div>
  </div>

  <script>
    function displayCart() {
      const cartList = document.getElementById('cart-list');
      const totalSum = document.getElementById('total-sum');
      const totalInfo = document.getElementById('total-info');
      const cartActions = document.getElementById('cart-actions');
      const checkoutForm = document.getElementById('checkout-form');

      let cart = JSON.parse(localStorage.getItem('cart')) || [];

      if (cart.length === 0) {
        cartList.innerHTML = `
            <p>Корзина пока пуста</p>
            <button class="btn-back" onclick="window.location.href='index.html'">Вернуться к покупкам</button>
        `;
        totalSum.innerText = "0";
        totalInfo.style.display = 'none';
        cartActions.style.display = 'none';
        checkoutForm.style.display = 'none';
        return;
      }

      totalInfo.style.display = 'block';
      cartActions.style.display = 'block';

      cartList.innerHTML = cart.map((item, index) => `
        <div class="item" onclick="this.classList.toggle('active')">
          <span>${item.title} - ${item.price} грн</span>
          <button class="delete-btn" onclick="event.stopPropagation(); removeFromCart(${index}, '${item.title}')">удалить товар</button>
        </div>
      `).join('');

      const total = cart.reduce((sum, item) => sum + Number(item.price), 0);
      totalSum.innerText = total;
    }

    function customConfirm(message, callback) {
      const modal = document.getElementById('modal-confirm');
      document.getElementById('modal-text').innerText = message;
      modal.style.display = 'flex';
      
      document.getElementById('modal-yes').onclick = function() {
        modal.style.display = 'none';
        callback(true);
      };
      document.getElementById('modal-no').onclick = function() {
        modal.style.display = 'none';
        callback(false);
      };
    }

    function customAlert(message, callback) {
      const modal = document.getElementById('modal-alert');
      document.getElementById('alert-text').innerText = message;
      modal.style.display = 'flex';
      
      document.getElementById('modal-ok').onclick = function() {
        modal.style.display = 'none';
        if(callback) callback();
      };
    }

    function removeFromCart(index, title) {
      customConfirm(`Вы уверены что хотите удалить товар ${title}?`, function(confirmed) {
        if (confirmed) {
          let cart = JSON.parse(localStorage.getItem('cart')) || [];
          cart.splice(index, 1);
          localStorage.setItem('cart', JSON.stringify(cart));
          displayCart();
          if (document.getElementById('checkout-form').style.display === 'block') {
              hideCheckout();
          }
        }
      });
    }

    function clearCart() {
      customConfirm("Вы уверены, что хотите очистить корзину?", function(confirmed) {
        if (confirmed) {
          localStorage.removeItem('cart');
          displayCart();
        }
      });
    }

    function showCheckout() {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      if (cart.length === 0) {
        customAlert("Корзина пуста, невозможно оформить заказ");
        return;
      }
      document.getElementById('checkout-form').style.display = 'block';
      document.getElementById('cart-actions').style.display = 'none';
    }

    function hideCheckout() {
      document.getElementById('checkout-form').style.display = 'none';
      document.getElementById('cart-actions').style.display = 'block';
    }

    function toggleCardFields() {
      const method = document.getElementById('payment-method').value;
      const cardDetails = document.getElementById('card-details');
      if (method === 'предоплата') {
        cardDetails.style.display = 'block';
      } else {
        cardDetails.style.display = 'none';
      }
    }

    function updatePhoneConstraint() {
      const countryCode = document.getElementById('country-code').value;
      const phoneInput = document.getElementById('phone');
      
      // Вычисляем сколько цифр нужно ввести, чтобы всего было 12 (включая код страны)
      // Очищаем код страны от '+' для подсчета цифр
      const codeDigits = countryCode.replace(/\D/g, '').length;
      const requiredDigits = 12 - codeDigits;
      
      // Устанавливаем максимальную длину (с учетом пробелов, которые добавит форматер)
      // Примерно: цифры + 2-3 пробела
      phoneInput.maxLength = requiredDigits + 5; 
      phoneInput.dataset.requiredDigits = requiredDigits;
      
      // Обновляем плейсхолдер
      let placeholder = "";
      for(let i=0; i<requiredDigits; i++) {
        placeholder += "0";
        if((i+1) % 3 === 0 && i < requiredDigits - 1) placeholder += " ";
      }
      phoneInput.placeholder = placeholder;
      
      // Сбрасываем текущее значение при смене страны для чистоты
      phoneInput.value = "";
    }

    function formatPhone(input) {
      let value = input.value.replace(/\D/g, '');
      const requiredDigits = parseInt(input.dataset.requiredDigits) || 9;
      
      // Ограничиваем количество цифр
      if (value.length > requiredDigits) {
        value = value.substring(0, requiredDigits);
      }
      
      // Форматируем с пробелами (каждые 3 цифры)
      let formatted = "";
      for (let i = 0; i < value.length; i++) {
        if (i > 0 && i % 3 === 0) {
          formatted += " ";
        }
        formatted += value[i];
      }
      
      input.value = formatted;
    }

    function confirmOrder() {
      const firstName = document.getElementById('first-name').value;
      const lastName = document.getElementById('last-name').value;
      const middleName = document.getElementById('middle-name').value;
      const countryCode = document.getElementById('country-code').value;
      const phone = document.getElementById('phone').value;
      const fullPhone = countryCode + phone;
      const branch = document.getElementById('branch').value;
      const address = document.getElementById('address').value;
      const paymentMethod = document.getElementById('payment-method').value;

      if (!firstName || !lastName || !middleName || !phone || !branch || !address) {
        customAlert("Пожалуйста, заполните все поля!");
        return;
      }

      if (paymentMethod === 'предоплата') {
        const cardNumber = document.getElementById('card-number').value;
        const cardExpiry = document.getElementById('card-expiry').value;
        const cardCvv = document.getElementById('card-cvv').value;
        if (!cardNumber || !cardExpiry || !cardCvv) {
          customAlert("Пожалуйста, заполните данные карты!");
          return;
        }
      }

           let cart = JSON.parse(localStorage.getItem('cart')) || [];
      const total = cart.reduce((sum, item) => sum + Number(item.price), 0);
      const itemsList = cart.map(item => item.title).join(', ');

      // 1. Формируем текст для письма тебе
      const messageForEmail = `Новый заказ!\nКлиент: ${firstName} ${lastName} ${middleName}\nСумма: ${total} грн\nОплата: ${paymentMethod}\nДоставка: ${branch}\nАдрес: ${address}\nТелефон: ${fullPhone}\nТовары: ${itemsList}`;

      // 2. Инициализация EmailJS (Вставь свой Public Key из EmailJS -> Account)
      emailjs.init("ТВОЙ_PUBLIC_KEY");

      // 3. Отправка письма ТЕБЕ (происходит в фоновом режиме)
      emailjs.send('zivinda.velsut@gmail.com', 'ТВОЙ_TEMPLATE_ID', {
          message: messageForEmail, 
          to_email: 'zivinda.velsut@gmail.com'
      }).then(function() {
          console.log("Письмо успешно отправлено владельцу магазина!");
      }, function(error) {
          console.log("Ошибка отправки письма:", error);
      });

      // 4. Показываем ТАБЛИЦУ ПОДТВЕРЖДЕНИЯ покупателю
      const messageForUser = `Спасибо, ${firstName} ${lastName} ${middleName}!\nЗаказ на сумму ${total} грн успешно оформлен.\nСпособ оплаты: ${paymentMethod}\nДоставка: ${branch}\nПо адресу: ${address}\nМы свяжемся с вами по номеру ${fullPhone}.\n\nТовары: ${itemsList}`;

      customAlert(messageForUser, function() {
          localStorage.removeItem('cart');
          window.location.href = 'index.html';
      });
    } // Конец функции оформления

    displayCart();
    updatePhoneConstraint();

  </script>

</body>
</html>
